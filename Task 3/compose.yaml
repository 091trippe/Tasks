services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db

    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: apiuser
      POSTGRES_PASSWORD: apipass123

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: flask-api

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskdb
      DB_USER: apiuser
      DB_PASS: apipass123

    ports:
      - "5000:5000"

volumes:
  pgdata:
